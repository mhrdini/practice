packages:
  - apps/*
  - packages/*
  - configs/*

catalog:
  '@antfu/eslint-config': ^7.7.3
  '@commitlint/cli': ^20.1.0
  '@commitlint/config-conventional': ^20.0.0
  '@commitlint/cz-commitlint': ^20.1.0
  barrelsby: ^2.8.1
  commitizen: ^4.3.1
  dotenv: ^17.2.3
  dotenv-cli: ^11.0.0
  dotenv-expand: ^12.0.3
  eslint: ^9.39.0
  eslint-plugin-format: ^2.0.1
  husky: ^9.1.7
  inquirer: ^9.3.8
  lint-staged: ^16.2.6
  prettier: ^3.8.1
  tsx: ^4.20.6
  turbo: ^2.6.0
  typescript: ^5.9.3
  validate-branch-name: ^1.3.2

catalogs:
  next:
    next: ^16.2.1
  node:
    '@types/node': ^20
  nuxt:
    '@nuxt/eslint': ^1.15.2
    '@nuxt/fonts': ^0.14.0
    nuxt: ^4.4.2
  react:
    '@types/react': ^19
    '@types/react-dom': ^19
    babel-plugin-react-compiler: 1.0.0
    react: 19.2.4
    react-dom: 19.2.4
  tailwindcss:
    '@tailwindcss/cli': ^4.2.2
    '@tailwindcss/postcss': ^4.2.2
    '@tailwindcss/vite': ^4.2.2
    autoprefixer: ^10.4.27
    tailwindcss: ^4.2.2
  ui:
    '@vueuse/core': ^14.2.1
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    lucide-react: ^1.7.0
    lucide-vue-next: ^1.0.0
    radix-ui: 1.4.3
    reka-ui: 2.9.2
    shadcn: ^4.1.0
    tailwind-merge: ^3.5.0
    tw-animate-css: ^1.4.0
  vue:
    vue: ^3.5.30
    vue-router: ^5.0.4

linkWorkspacePackages: true

shellEmulator: true

trustPolicy: no-downgrade
