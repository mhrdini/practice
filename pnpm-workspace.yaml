packages:
  - 'apps/*'
  - 'packages/*'
  - 'configs/*'

catalog:
  '@eslint/js': ^9.38.0
  '@types/node': ^22.19.0
  dotenv: ^17.2.3
  dotenv-cli: ^11.0.0
  eslint: ^9.39.0
  inquirer: ^9.3.8
  prettier: ^3.6.2
  tsx: ^4.20.6
  typescript: ^5.9.3

linkWorkspacePackages: true

publicHoistPattern:
  - '@ianvs/prettier-plugin-sort-imports'